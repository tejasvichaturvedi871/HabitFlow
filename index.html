<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Flow</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0d0f1a;
  --text: #e8e6f0;
  --muted: #7a7a9a;
  --accent: #4ade80;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

nav div {
  display: flex;
  gap: 15px;
}

nav a {
  color: var(--muted);
  text-decoration: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 60px;
}

.hero span {
  color: var(--accent);
}

.hero p {
  margin-top: 15px;
  color: var(--muted);
}

/* BUTTONS */
.hero-buttons {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.btn {
  padding: 12px 20px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

.primary {
  background: var(--accent);
  color: black;
}

.secondary {
  border: 1px solid var(--muted);
  color: white;
}

/* QUOTE */
.quote-box {
  margin: 40px auto;
  text-align: center;
}

/* MOBILE FIX */
@media(max-width:768px){

  .hero h1 {
    font-size: 32px;
  }

  .hero-buttons {
    flex-direction: column;
    align-items: center;
  }

  .hero-buttons a {
    width: 100%;
    max-width: 300px;
    text-align: center;
  }

  nav {
    flex-direction: column;
    gap: 10px;
  }

  body {
    font-size: 16px;
  }

}

</style>

</head>

<body>

<nav>
  <h2>Habit Flow</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="journal.html">Journal</a>
    <a href="habits.html">Habits</a>
    <a href="analytics.html">Analytics</a>
  </div>
</nav>

<section class="hero">
  <h1>Build <span>Better</span><br>Habits Daily</h1>
  <p>Your all-in-one system to track, grow, and improve.</p>

  <div class="hero-buttons">
    <a href="habits.html" class="btn primary">Start Tracking</a>
    <a href="journal.html" class="btn secondary">Write Journal</a>
    <a href="analytics.html" class="btn secondary">View Growth</a>
  </div>
</section>

<div class="quote-box">
  <p id="quote"></p>
</div>

<script>
const quotes = [
  "Small daily habits create big life changes.",
  "Consistency beats motivation every time.",
  "Discipline is choosing what you want most."
];

let i = 0;

setInterval(() => {
  document.getElementById("quote").textContent = quotes[i];
  i = (i + 1) % quotes.length;
}, 2000);
</script>

</body>
</html>
