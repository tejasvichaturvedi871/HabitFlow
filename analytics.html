<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics - Habit Flow</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* CHART */
canvas {
  margin-top: 20px;
  background: #1a1d35;
  padding: 15px;
  border-radius: 10px;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
  gap: 10px;
}

.stat-card {
  flex: 1;
  background: #1a1d35;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  font-size: 18px;
}

/* MOBILE FIX */
@media(max-width:768px){

  .container {
    padding: 15px;
  }

  h2 {
    font-size: 22px;
  }

  canvas {
    width: 100% !important;
  }

  .stats {
    flex-direction: column;
  }

  .stat-card {
    font-size: 16px;
  }

}

</style>

</head>

<body>

<nav>
  <h1>Habit Flow</h1>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="journal.html">Journal</a>
    <a href="habits.html">Habits</a>
    <a href="analytics.html">Analytics</a>
  </div>
</nav>

<div class="container">

  <h2>📊 Progress</h2>

  <canvas id="chart"></canvas>

  <div class="stats">
    <div class="stat-card">
      Weekly<br><span id="weekly"></span>
    </div>
    <div class="stat-card">
      Monthly<br><span id="monthly"></span>
    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
