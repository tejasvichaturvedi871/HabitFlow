<!DOCTYPE html>
<html>
<head>
<title>Analytics</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="container">
  <h2>Daily Journal</h2>

  <div class="journal-input">
    <input type="text" id="journalInput" placeholder="What did you do today?">
    <button onclick="addJournal()">Add</button>
  </div>

  <ul id="journalList"></ul>
</div>
<div class="container">

<h2>📊 Progress</h2>
<canvas id="chart"></canvas>

<div class="stats">
  <div>Weekly: <span id="weekly"></span></div>
  <div>Monthly: <span id="monthly"></span></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
